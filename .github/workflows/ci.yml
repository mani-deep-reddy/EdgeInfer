name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ARM toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi

      - name: Build
        run: make -f scripts/Makefile

      - name: Verify binary
        run: |
          if [ -f build/app.elf ]; then
            echo "Binary built successfully"
            arm-none-eabi-size build/app.elf
          else
            echo "ERROR: build/app.elf not found"
            exit 1
          fi
